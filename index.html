<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Londra Tatil Planı</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner topbar">
        <div class="brand">
          <p class="eyebrow">20&ndash;26 Temmuz &middot; Londra</p>
          <h1>Tatil planı</h1>
        </div>
        <div class="name-box">
          <span class="sync-pill" id="syncStatus" data-state="local">Yerel</span>
          <input id="personName" type="text" placeholder="Adın" autocomplete="name" />
          <button id="saveNameBtn" type="button" title="Adı kaydet" class="icon-button">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3,8.5 6.5,12 13,4"/></svg>
          </button>
        </div>
      </div>
    </header>
    <div class="page">
      <main class="layout">
        <section class="board-wrap">
          <div class="quick-add">
            <input id="quickTitle" type="text" placeholder="Yeni plan: kahvaltı, müze, rezervasyon..." />
            <select id="quickDay" aria-label="Gün seç">
              <option value="common">Ortak</option>
              <option value="20">20 Tem</option>
              <option value="21">21 Tem</option>
              <option value="22">22 Tem</option>
              <option value="23">23 Tem</option>
              <option value="24">24 Tem</option>
              <option value="25">25 Tem</option>
              <option value="26">26 Tem</option>
            </select>
            <button id="quickAddBtn" type="button" class="primary">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
              <span>Ekle</span>
            </button>
          </div>

          <nav class="day-tabs" id="dayTabs" aria-label="Gün seç"></nav>

          <div id="dayBoard" class="day-board" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <dialog id="eventDialog">
      <div id="eventView" class="event-view" hidden>
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="dialog-head">
          <h2 id="viewTitle"></h2>
          <button id="closeViewBtn" type="button" title="Kapat" class="icon-button">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
          </button>
        </div>
        <div id="viewBody" class="view-body"></div>
        <div class="dialog-actions">
          <button id="viewDeleteBtn" class="ghost danger" type="button">Sil</button>
          <div class="view-actions-right">
            <button id="viewCommentsBtn" class="ghost" type="button">Yorumlar</button>
            <button id="editModeBtn" class="primary" type="button">Düzenle</button>
          </div>
        </div>
      </div>
      <form id="eventForm" method="dialog" class="event-form" hidden>
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="dialog-head">
          <h2 id="formTitle">Plan ekle</h2>
          <button id="closeDialogBtn" type="button" title="Kapat" class="icon-button">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
          </button>
        </div>
        <input type="hidden" id="eventId" />
        <label>
          Başlık
          <input id="eventTitle" type="text" required />
        </label>
        <div class="form-row">
          <label>
            Tip
            <select id="eventType">
              <option value="todo">Plan</option>
              <option value="flight">Uçuş</option>
              <option value="hotel">Otel</option>
              <option value="transfer">Transfer</option>
              <option value="food">Yemek</option>
              <option value="sight">Gezilecek</option>
              <option value="reservation">Rezervasyon</option>
            </select>
          </label>
          <label>
            Gün
            <select id="eventDay">
              <option value="common">Ortak</option>
              <option value="20">20 Tem</option>
              <option value="21">21 Tem</option>
              <option value="22">22 Tem</option>
              <option value="23">23 Tem</option>
              <option value="24">24 Tem</option>
              <option value="25">25 Tem</option>
              <option value="26">26 Tem</option>
            </select>
          </label>
          <label>
            Saat
            <input id="eventTime" type="time" />
          </label>
        </div>
        <label>
          Yer / kısa not
          <input id="eventArea" type="text" placeholder="Soho, Westminster, otel..." />
        </label>
        <label>
          Link
          <input id="eventAddress" type="text" placeholder="Rezervasyon veya harita linki" />
        </label>
        <label>
          Not
          <textarea id="eventNotes" rows="3"></textarea>
        </label>
        <section id="eventAttachmentsBlock" class="dialog-section">
          <h3>Ekler — resim, PDF, link</h3>
          <label class="file-add">
            Telefondan veya bilgisayardan resim / PDF ekle
            <input id="attachmentFile" type="file" accept="image/*,application/pdf" multiple />
          </label>
          <div class="link-add">
            <input id="attachmentName" type="text" placeholder="Başlık" />
            <input id="attachmentUrl" type="url" placeholder="veya link yapıştır" />
            <button id="addAttachmentLinkBtn" type="button" class="ghost">Link ekle</button>
          </div>
          <div id="eventAttachmentList" class="attachment-list"></div>
        </section>
        <p id="eventAudit" class="event-audit"></p>
        <div class="dialog-actions">
          <button id="deleteEventBtn" class="ghost danger" type="button">Sil</button>
          <button class="primary" type="submit">Kaydet</button>
        </div>
      </form>
    </dialog>

    <dialog id="commentDialog">
      <form id="commentForm" method="dialog" class="comment-dialog">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="dialog-head">
          <div>
            <h2 id="commentTitle">Yorumlar</h2>
            <p id="commentMeta" class="small"></p>
          </div>
          <button id="closeCommentBtn" type="button" title="Kapat" class="icon-button">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
          </button>
        </div>
        <input id="commentEventId" type="hidden" />
        <div id="commentList" class="comment-list"></div>
        <textarea id="commentText" rows="3" placeholder="Yeni yorum yaz"></textarea>
        <button class="primary" type="submit">Yorum ekle</button>
      </form>
    </dialog>

    <dialog id="lightbox" class="lightbox">
      <button id="lightboxClose" class="lightbox-close" type="button" title="Kapat" aria-label="Kapat">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
      </button>
      <div id="lightboxContent" class="lightbox-content"></div>
    </dialog>

    <dialog id="nameDialog">
      <form method="dialog" id="nameForm" class="name-form">
        <div class="sheet-handle" aria-hidden="true"></div>
        <h2>Adını yaz</h2>
        <p>Yorum ve değişikliklerde bu ad görünecek.</p>
        <input id="dialogName" type="text" placeholder="Örn. Can" autocomplete="name" required />
        <button class="primary" type="submit">Devam</button>
      </form>
    </dialog>

    <script src="firebase.config.js"></script>
    <script src="data/trip-events.js"></script>
    <script src="app.js"></script>
  </body>
</html>
